services:
  # Nginx reverse proxy: serves frontend static files, proxies API to app
  # This is the public-facing service that Coolify should route traffic to.
  nginx:
    build:
      context: ./saas
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  # FastAPI backend (API only — no static files)
  app:
    build:
      context: .
      dockerfile: saas/Dockerfile
    environment:
      - BASE_URL=${BASE_URL:-http://localhost:8000}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - STORAGE_PATH=${STORAGE_PATH:-storage/outputs}
      - TEMP_PATH=${TEMP_PATH:-storage/tmp}
      - TOKEN_EXPIRY_HOURS=${TOKEN_EXPIRY_HOURS:-6}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
      - RATE_LIMIT_GENERATE=${RATE_LIMIT_GENERATE:-5/minute}
    expose:
      - "8000"
    volumes:
      - mcp_storage:/app/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  mcp_storage:
    driver: local
